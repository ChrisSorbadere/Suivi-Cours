<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suivi Cours</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Suivi Cours" />
    <meta name="theme-color" content="#1A1A2E" />
    <style>
      body { margin: 0; background: #D6DEE8; }
      #loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:sans-serif; color:#666; }
      #loading .spin { width:32px; height:32px; border:3px solid #ccc; border-top-color:#1A1A2E; border-radius:50%; animation:spin .7s linear infinite; margin-bottom:16px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading"><div class="spin"></div>Démarrage de l'application…</div>
    </div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="react" src="./app.jsx"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(r => console.log('SW OK', r.scope))
            .catch(e => console.error('SW KO', e));
        });
      }
    </script>
  </body>
</html>
