<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suivi Cours</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Suivi Cours" />
    <meta name="theme-color" content="#1A1A2E" />
    <style>
      html, body { margin: 0; background: #D6DEE8; overscroll-behavior-y: contain; }
      #loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:sans-serif; color:#666; text-align:center; padding:0 24px; }
      #loading .spin { width:32px; height:32px; border:3px solid #ccc; border-top-color:#1A1A2E; border-radius:50%; animation:spin .7s linear infinite; margin-bottom:16px; }
      #loading .err { color:#c0392b; font-size:13px; margin-top:12px; max-width:320px; }
      #loading a { color:#1A1A2E; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading">
        <div class="spin"></div>
        <div id="loadmsg">Démarrage de l'application…</div>
      </div>
    </div>

    <!-- React via jsDelivr (CDN plus fiable que unpkg) -->
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>

    <!-- Vérification du chargement des bibliothèques -->
    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          var msg = document.getElementById('loadmsg');
          if (typeof React === 'undefined' || typeof ReactDOM === 'undefined' || typeof Babel === 'undefined') {
            if (msg) {
              msg.innerHTML = 'Les bibliothèques n\'ont pas pu se charger.<div class="err">Vérifie ta connexion internet, puis recharge la page. Si le problème persiste, ferme et rouvre l\'application.</div>';
              var sp = document.querySelector('#loading .spin');
              if (sp) sp.style.display = 'none';
            }
          }
        }, 5000);
      });
    </script>

    <!-- Application -->
    <script type="text/babel" data-presets="react" src="./app.jsx"></script>

    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('./sw.js')
            .then(function (r) { console.log('SW OK', r.scope); })
            .catch(function (e) { console.error('SW KO', e); });
        });
      }
    </script>
  </body>
</html>
